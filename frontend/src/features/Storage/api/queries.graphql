query browseStorage($path: String!) {
    browse(path: $path) {
        ... on FolderNode {
            __typename
            name
            path
            error
            stack
        }
        ... on DatasetStorageNode {
            __typename
            name
            path
            model {
                id
                annotationCampaigns {
                    edges {
                        node {
                            isArchived
                        }
                    }
                }
            }
            error
            stack
        }
        ... on AnalysisStorageNode {
            __typename
            name
            path
            model {
                isImportCompleted
                annotationCampaigns {
                    edges {
                        node {
                            isArchived
                        }
                    }
                }
            }
            importTask {
                identifier
                status
            }
            error
            stack
        }
    }
}

