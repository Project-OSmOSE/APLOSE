mutation importDatasetFromStorage($datasetPath: String!, $analysisPath: String) {
    importDataset(datasetPath: $datasetPath, analysisPath: $analysisPath) {
        dataset {
            path
        }
        analysisResult {
            path
            backgroundTaskId
            errors {
                field
                messages
            }
        }
    }
}
